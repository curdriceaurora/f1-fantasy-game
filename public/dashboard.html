<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 Martin's F1 Fantasy League — Season Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="dashboard.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
</head>

<body data-dashboard-view="standings">
  <a href="dashboard.html" class="site-banner">2026 Martin's F1 Fantasy League</a>

  <nav class="global-nav">
    <a href="dashboard.html" class="nav-active">📊 Dashboard</a>
    <a href="rules.html#rules">📋 Rules</a>
    <a href="rules.html#faq">❓ FAQ</a>
  </nav>

  <main class="dashboard-shell">
    <section class="dashboard-hero">
      <div>
        <h1 class="dashboard-title-accent">League standings</h1>
        <p class="dashboard-copy">Select your team below to view locked picks, race breakdowns, and season bonuses.</p>
      </div>
    </section>

    <section class="dashboard-grid">
      <div class="dashboard-card glass-card" id="standings-section">
        <div class="standings-table-wrap">
          <table class="standings-table">
            <thead>
              <tr>
                <th>Rank</th>
                <th>Team</th>
                <th>Principal</th>
                <th>Total</th>
                <th>Latest race</th>
                <th>Change</th>
              </tr>
            </thead>
            <tbody id="standings-body"></tbody>
          </table>
        </div>
      </div>

      <div class="dashboard-rail">
        <section class="dashboard-card glass-card">
          <div class="card-header">
            <div>
              <h2 class="dashboard-title-accent">Big movers this week</h2>
            </div>
          </div>
          <div id="big-movers" class="movers-grid"></div>
        </section>

        <section class="dashboard-card glass-card">
          <div class="card-header">
            <div>
              <h2 class="dashboard-title-accent">Schedule</h2>
            </div>
            <div class="card-actions">
              <a class="team-back-link" href="rules.html#calendar">Full schedule</a>
            </div>
          </div>
          <div id="race-status-list" class="race-status-list"></div>
        </section>
      </div>
    </section>
  </main>

  <script type="module" src="dashboard.js"></script>
</body>

</html>
