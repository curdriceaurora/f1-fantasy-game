name: Auto Score Race

on:
  schedule:
    - cron: '0 14 * * 1'  # Every Monday 14:00 UTC (after the 12:00 UTC publication window)
    - cron: '0 14 * * 4'  # Every Thursday 14:00 UTC (catch late steward decisions)
  workflow_dispatch:       # Allow manual trigger from GitHub UI

jobs:
  auto-score:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run auto-scorer
        run: node scripts/auto-score.mjs

      - name: Commit and push season data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add season/
          git diff --cached --quiet && echo "No changes to commit." || \
            git commit -m "chore: auto-score race with FIA fine documents [skip ci]" && git push
