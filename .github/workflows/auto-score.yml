name: Auto Score Race

on:
  schedule:
    - cron: '0 14 * * 1'  # Every Monday 14:00 UTC (after the 12:00 UTC publication window)
    - cron: '0 14 * * 4'  # Every Thursday 14:00 UTC (catch late steward decisions)
  workflow_dispatch:       # Allow manual trigger from GitHub UI

concurrency:
  group: auto-score-season-data
  cancel-in-progress: false

jobs:
  auto-score:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run auto-scorer
        run: node scripts/auto-score.mjs

      - name: Commit and push season data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add season/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: auto-score race with FIA fine documents [skip ci]"

          branch="${GITHUB_REF_NAME:-main}"
          for attempt in 1 2 3; do
            if git pull --rebase origin "$branch" && git push origin "HEAD:$branch"; then
              exit 0
            fi
            git rebase --abort || true
            sleep $((attempt * 2))
          done

          echo "Failed to push auto-score commit after 3 attempts."
          exit 1
